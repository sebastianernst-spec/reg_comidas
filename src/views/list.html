<!DOCTYPE html>
<html class="light" lang="es">
<head>
    <meta charset="utf-8"/>
    <meta content="width=device-width, initial-scale=1.0" name="viewport"/>
    <title>EduMeals - Registro de Consumo</title>
    <link href="https://fonts.googleapis.com/css2?family=Lexend:wght@300;400;500;600;700;800&display=swap" rel="stylesheet"/>
    <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&display=swap" rel="stylesheet"/>
    <script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        primary: '#274ed5',
                        background: '#f6f9ff',
                    }
                }
            }
        }
    </script>
    <style>
        body { font-family: 'Lexend', sans-serif; background-color: #f6f9ff; }
        .column-divider { border-right: 2px solid #cbd5e1; }
        table { min-width: 800px; } /* Evita que las columnas se colapsen */
    </style>
</head>
<body class="bg-background min-h-screen">

    <header class="bg-white shadow-sm px-6 py-4 flex justify-between items-center sticky top-0 z-10">
        <div class="flex items-center gap-2">
            <span class="material-symbols-outlined text-primary">restaurant</span>
            <h1 class="font-bold text-xl text-primary">EduMeals</h1>
        </div>
        <div class="text-sm text-slate-500 font-medium">7mo Básico - Planilla de Consumo</div>
    </header>

    <main class="p-6">
        <div class="overflow-x-auto bg-white rounded-xl shadow-md border border-slate-200">
            <table class="w-full border-collapse">
                <thead>
                    <tr class="bg-slate-50 text-[11px] uppercase tracking-wider text-slate-600">
                        <th class="p-4 border-b border-r text-left w-64">Estudiante</th>
                        <th colspan="4" class="p-2 border-b border-r text-center bg-blue-50/30">Ensalada</th>
                        <th colspan="4" class="p-2 border-b border-r text-center bg-orange-50/30">Plato Fondo</th>
                        <th colspan="4" class="p-2 border-b text-center bg-green-50/30">Postre</th>
                    </tr>
                    <tr class="text-[10px] text-slate-400 bg-slate-50/50">
                        <th class="p-2 border-b border-r">Nombre</th>
                        <th class="p-1 border-b">0</th><th class="p-1 border-b">1/4</th><th class="p-1 border-b">1/2</th><th class="p-1 border-b border-r">1</th>
                        <th class="p-1 border-b">0</th><th class="p-1 border-b">1/4</th><th class="p-1 border-b">1/2</th><th class="p-1 border-b border-r">1</th>
                        <th class="p-1 border-b">0</th><th class="p-1 border-b">1/4</th><th class="p-1 border-b">1/2</th><th class="p-1 border-b">1</th>
                    </tr>
                </thead>
                <tbody class="text-sm divide-y divide-slate-100">
                    <script>
                        const alumnos = [
                            { id: 1, nombre: "BENJAMÍN ARAYA", info: "(ALERGIA: MANÍ)", alerta: true },
                            { id: 2, nombre: "CATALINA FUENTES", info: "" },
                            { id: 3, nombre: "DIEGO MONSALVE", info: "" },
                            { id: 4, nombre: "ELENA RETAMAL", info: "" },
                            { id: 5, nombre: "FELIPE SANDOVAL", info: "" },
                            { id: 6, nombre: "GABRIELA TOLEDO", info: "" },
                            { id: 7, nombre: "HUGO VILLALOBOS", info: "" },
                            { id: 8, nombre: "ISIDORA ZAPATA", info: "(CELÍACA)", alerta: true },
                            { id: 9, nombre: "JOAQUÍN BENÍTEZ", info: "" },
                            { id: 10, nombre: "KARLA MIRANDA", info: "" }
                        ];

                        document.write(alumnos.map(a => `
                            <tr class="hover:bg-slate-50 transition-colors">
                                <td class="p-3 border-r font-medium ${a.alerta ? 'text-red-600' : 'text-slate-700'}">
                                    ${a.id}. ${a.nombre} <span class="text-[10px] block opacity-70">${a.info}</span>
                                </td>
                                <td class="p-2 text-center"><input type="radio" name="ens-${a.id}" class="text-primary focus:ring-primary"></td>
                                <td class="p-2 text-center"><input type="radio" name="ens-${a.id}" class="text-primary focus:ring-primary"></td>
                                <td class="p-2 text-center"><input type="radio" name="ens-${a.id}" class="text-primary focus:ring-primary"></td>
                                <td class="p-2 text-center border-r"><input type="radio" name="ens-${a.id}" class="text-primary focus:ring-primary"></td>
                                <td class="p-2 text-center"><input type="radio" name="plt-${a.id}" class="text-primary focus:ring-primary"></td>
                                <td class="p-2 text-center"><input type="radio" name="plt-${a.id}" class="text-primary focus:ring-primary"></td>
                                <td class="p-2 text-center"><input type="radio" name="plt-${a.id}" class="text-primary focus:ring-primary"></td>
                                <td class="p-2 text-center border-r"><input type="radio" name="plt-${a.id}" class="text-primary focus:ring-primary"></td>
                                <td class="p-2 text-center"><input type="radio" name="pos-${a.id}" class="text-primary focus:ring-primary"></td>
                                <td class="p-2 text-center"><input type="radio" name="pos-${a.id}" class="text-primary focus:ring-primary"></td>
                                <td class="p-2 text-center"><input type="radio" name="pos-${a.id}" class="text-primary focus:ring-primary"></td>
                                <td class="p-2 text-center"><input type="radio" name="pos-${a.id}" class="text-primary focus:ring-primary"></td>
                            </tr>
                        `).join(''));
                    </script>
                </tbody>
            </table>
        </div>
    </main>

</body>
</html>
