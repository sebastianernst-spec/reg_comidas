<!DOCTYPE html>
<html class="light" lang="es">
<head>
    <meta charset="utf-8"/>
    <meta content="width=device-width, initial-scale=1.0" name="viewport"/>
    <title>EduMeals - Lista de Alumnos</title>
    <link href="https://fonts.googleapis.com/css2?family=Lexend:wght@300;400;500;600;700;800&display=swap" rel="stylesheet"/>
    <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&display=swap" rel="stylesheet"/>
    <script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
    <style>
        body { font-family: 'Lexend', sans-serif; background-color: #f6f9ff; }
        .glass-header { background: rgba(255, 255, 255, 0.8); backdrop-filter: blur(12px); border-bottom: 1px solid rgba(184, 196, 255, 0.3); }
    </style>
</head>
<body class="bg-background text-on-background min-h-screen">

    <header class="glass-header sticky top-0 z-50 px-6 py-4 flex items-center justify-between">
        <div class="flex items-center gap-3">
            <div class="w-10 h-10 rounded-lg bg-primary flex items-center justify-center shadow-md">
                <span class="material-symbols-outlined text-white text-2xl">restaurant</span>
            </div>
            <h1 class="text-title-sm font-bold text-primary">EduMeals</h1>
        </div>
        <div class="flex items-center gap-4">
            <span class="text-label-sm text-on-surface-variant hidden md:block">Profesor Jefe</span>
            <div class="w-10 h-10 rounded-full bg-surface-container-highest border border-primary/20 flex items-center justify-center">
                <span class="material-symbols-outlined text-primary">person</span>
            </div>
        </div>
    </header>

    <main class="max-w-6xl mx-auto p-6">
        <div class="flex flex-col md:flex-row md:items-center justify-between gap-4 mb-8">
            <div>
                <h2 class="text-headline-md font-bold text-on-background">Lista de Alumnos</h2>
                <p class="text-body-md text-on-surface-variant">7mo Básico - Registro de raciones hoy</p>
            </div>
            <div class="flex gap-2">
                <button class="flex items-center gap-2 bg-white border border-outline-variant px-4 py-2 rounded-lg text-label-sm hover:bg-surface-container transition-all">
                    <span class="material-symbols-outlined text-lg">filter_list</span> Filtrar
                </button>
                <button class="flex items-center gap-2 bg-primary text-white px-4 py-2 rounded-lg text-label-sm hover:bg-primary/90 shadow-md transition-all">
                    <span class="material-symbols-outlined text-lg">add</span> Nuevo Alumno
                </button>
            </div>
        </div>

        <div class="bg-white border border-outline-variant/30 rounded-xl shadow-sm overflow-hidden">
            <table class="w-full text-left border-collapse">
                <thead class="bg-surface-container-low border-bottom border-outline-variant/20">
                    <tr>
                        <th class="p-4 font-label-sm text-on-surface-variant">Alumno</th>
                        <th class="p-4 font-label-sm text-on-surface-variant">RUT</th>
                        <th class="p-4 font-label-sm text-on-surface-variant">Estado Comida</th>
                        <th class="p-4 font-label-sm text-on-surface-variant">Alertas</th>
                        <th class="p-4 font-label-sm text-on-surface-variant text-right">Acciones</th>
                    </tr>
                </thead>
                <tbody class="divide-y divide-outline-variant/10">
                    <tr class="hover:bg-surface-container-lowest transition-colors">
                        <td class="p-4 flex items-center gap-3">
                            <div class="w-8 h-8 rounded bg-secondary-container text-on-secondary-container flex items-center justify-center font-bold text-xs">AE</div>
                            <span class="font-body-md font-medium">Alonso Espinoza</span>
                        </td>
                        <td class="p-4 text-label-sm text-on-surface-variant">21.445.678-9</td>
                        <td class="p-4">
                            <span class="px-3 py-1 rounded-full bg-green-100 text-green-700 text-[12px] font-bold">ENTREGADO</span>
                        </td>
                        <td class="p-4">
                            <span class="material-symbols-outlined text-tertiary text-lg" title="Alergia alimentaria">warning</span>
                        </td>
                        <td class="p-4 text-right">
                            <button class="text-primary hover:bg-primary/10 p-2 rounded-full transition-all">
                                <span class="material-symbols-outlined">edit</span>
                            </button>
                        </td>
                    </tr>
                    <tr class="hover:bg-surface-container-lowest transition-colors">
                        <td class="p-4 flex items-center gap-3">
                            <div class="w-8 h-8 rounded bg-primary-fixed text-on-primary-fixed flex items-center justify-center font-bold text-xs">MV</div>
                            <span class="font-body-md font-medium">Martina Valdés</span>
                        </td>
                        <td class="p-4 text-label-sm text-on-surface-variant">22.123.456-K</td>
                        <td class="p-4">
                            <span class="px-3 py-1 rounded-full bg-surface-container-highest text-on-surface-variant text-[12px] font-bold">PENDIENTE</span>
                        </td>
                        <td class="p-4">
                            <span class="text-label-sm text-outline">—</span>
                        </td>
                        <td class="p-4 text-right">
                            <button class="text-primary hover:bg-primary/10 p-2 rounded-full transition-all">
                                <span class="material-symbols-outlined">edit</span>
                            </button>
                        </td>
                    </tr>
                </tbody>
            </table>
        </div>
    </main>
</body>
</html>
