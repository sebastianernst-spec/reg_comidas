<!DOCTYPE html>

<html class="light" lang="es"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<link href="https://fonts.googleapis.com/css2?family=Lexend:wght@300;400;500;600;700;800&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<script id="tailwind-config">
    tailwind.config = {
      darkMode: "class",
      theme: {
        extend: {
          "colors": {
                  "on-primary-container": "#fffbff",
                  "tertiary": "#7b5500",
                  "primary-fixed-dim": "#b8c4ff",
                  "secondary-fixed-dim": "#58dcb5",
                  "on-tertiary-fixed": "#281900",
                  "surface-bright": "#f6f9ff",
                  "on-secondary-fixed-variant": "#00513e",
                  "inverse-surface": "#2a3138",
                  "outline": "#747686",
                  "surface-container-lowest": "#ffffff",
                  "on-secondary-fixed": "#002117",
                  "inverse-on-surface": "#ebf1fa",
                  "background": "#f6f9ff",
                  "secondary-fixed": "#77f9d0",
                  "on-error": "#ffffff",
                  "inverse-primary": "#b8c4ff",
                  "tertiary-fixed-dim": "#ffba37",
                  "tertiary-fixed": "#ffdeac",
                  "surface-dim": "#d4dbe3",
                  "on-primary": "#ffffff",
                  "surface-container-highest": "#dce3ec",
                  "on-background": "#151c22",
                  "surface-container-low": "#eef4fd",
                  "primary-container": "#4669f0",
                  "on-tertiary-container": "#fffbff",
                  "tertiary-container": "#9b6c00",
                  "on-secondary-container": "#007259",
                  "surface-container": "#e8eef7",
                  "error-container": "#ffdad6",
                  "outline-variant": "#c4c5d7",
                  "primary-fixed": "#dde1ff",
                  "secondary": "#006b54",
                  "error": "#ba1a1a",
                  "on-surface": "#151c22",
                  "on-error-container": "#93000a",
                  "on-tertiary-fixed-variant": "#604100",
                  "on-surface-variant": "#444654",
                  "surface": "#f6f9ff",
                  "on-secondary": "#ffffff",
                  "surface-variant": "#dce3ec",
                  "secondary-container": "#77f9d0",
                  "on-tertiary": "#ffffff",
                  "on-primary-fixed-variant": "#0036bc",
                  "on-primary-fixed": "#001355",
                  "primary": "#274ed5",
                  "surface-tint": "#2a50d8"
          },
          "borderRadius": {
                  "DEFAULT": "0.25rem",
                  "lg": "0.5rem",
                  "xl": "0.75rem",
                  "full": "9999px"
          },
          "spacing": {
                  "xl": "80px",
                  "xs": "4px",
                  "md": "24px",
                  "lg": "48px",
                  "sm": "12px",
                  "base": "8px",
                  "gutter": "24px",
                  "margin": "32px"
          },
          "fontFamily": {
                  "display-lg": ["Lexend"],
                  "label-sm": ["Lexend"],
                  "body-md": ["Lexend"],
                  "title-sm": ["Lexend"],
                  "headline-md": ["Lexend"]
          },
          "fontSize": {
                  "display-lg": ["48px", {"lineHeight": "1.2", "fontWeight": "700"}],
                  "label-sm": ["13px", {"lineHeight": "1.0", "letterSpacing": "0.02em", "fontWeight": "500"}],
                  "body-md": ["16px", {"lineHeight": "1.6", "fontWeight": "400"}],
                  "title-sm": ["20px", {"lineHeight": "1.4", "fontWeight": "500"}],
                  "headline-md": ["32px", {"lineHeight": "1.3", "fontWeight": "600"}]
          }
        },
      },
    }
  </script>
<style>
    body {
      font-family: 'Lexend', sans-serif;
      background-color: #f6f9ff;
    }
    .material-symbols-outlined {
      font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24;
    }
    .glass-effect {
      background: rgba(255, 255, 255, 0.8);
      backdrop-filter: blur(12px);
      -webkit-backdrop-filter: blur(12px);
    }
  </style>
<style>
    body {
      min-height: max(884px, 100dvh);
    }
  </style>
  </head>
<body class="bg-background text-on-background min-h-screen flex flex-col items-center justify-center p-gutter">
<main class="w-full max-w-[440px] flex flex-col gap-lg">
<div class="flex flex-col items-center text-center gap-base">
<div class="w-20 h-20 rounded-xl bg-primary flex items-center justify-center shadow-lg shadow-primary/20 mb-sm">
<span class="material-symbols-outlined text-white text-[40px]" data-icon="restaurant" style="font-variation-settings: 'FILL' 1;">restaurant</span>
</div>
<h1 class="font-display-lg text-headline-md text-on-background tracking-tight">EduMeals</h1>
<p class="font-body-md text-on-surface-variant">Gestión inteligente de alimentación escolar</p>
</div>
<section class="bg-surface-container-lowest border border-outline-variant/30 rounded-xl p-md shadow-sm">
<div class="mb-md">
<h2 class="font-headline-md text-title-sm text-on-background">Bienvenido de nuevo</h2>
<p class="font-label-sm text-on-surface-variant mt-xs">Ingresa tus credenciales para continuar</p>
</div>
<form class="flex flex-col gap-md">
<div class="flex flex-col gap-xs">
<label class="font-label-sm text-on-surface-variant ml-xs" for="email">Correo electrónico</label>
<div class="relative">
<span class="material-symbols-outlined absolute left-4 top-1/2 -translate-y-1/2 text-outline" data-icon="mail">mail</span>
<input class="w-full pl-12 pr-4 py-3 bg-surface-container-low border border-outline-variant rounded-lg focus:ring-2 focus:ring-primary focus:border-transparent transition-all outline-none font-body-md text-on-surface" id="email" placeholder="nombre@colegio.edu" type="email"/>
</div>
</div>
<div class="flex flex-col gap-xs">
<label class="font-label-sm text-on-surface-variant ml-xs" for="password">Contraseña</label>
<div class="relative">
<span class="material-symbols-outlined absolute left-4 top-1/2 -translate-y-1/2 text-outline" data-icon="lock">lock</span>
<input class="w-full pl-12 pr-4 py-3 bg-surface-container-low border border-outline-variant rounded-lg focus:ring-2 focus:ring-primary focus:border-transparent transition-all outline-none font-body-md text-on-surface" id="password" placeholder="••••••••" type="password"/>
</div>
</div>
<div class="flex justify-end">
<a class="font-label-sm text-primary hover:underline transition-all" href="#">¿Olvidaste tu contraseña?</a>
</div>
<button class="w-full bg-primary text-white py-4 rounded-xl font-title-sm text-body-md hover:bg-primary/90 active:scale-[0.98] transition-all shadow-md shadow-primary/20" type="submit">
          Iniciar Sesión
        </button>
</form>
<div class="mt-md flex items-center gap-sm">
<div class="h-px bg-outline-variant flex-1"></div>
<span class="font-label-sm text-outline">O ingresa con</span>
<div class="h-px bg-outline-variant flex-1"></div>
</div>
<div class="mt-md grid grid-cols-2 gap-sm">
<button class="flex items-center justify-center gap-xs py-2 px-4 border border-outline-variant rounded-lg font-label-sm text-on-surface hover:bg-surface-container transition-colors">
<span class="material-symbols-outlined text-[20px]" data-icon="google">google</span>
          Google
        </button>
<button class="flex items-center justify-center gap-xs py-2 px-4 border border-outline-variant rounded-lg font-label-sm text-on-surface hover:bg-surface-container transition-colors">
<span class="material-symbols-outlined text-[20px]" data-icon="school">school</span>
          SIS Institucional
        </button>
</div>
</section>
<footer class="text-center">
<p class="font-body-md text-on-surface-variant">
        ¿No tienes cuenta? 
        <a class="text-primary font-bold hover:underline" href="#">Regístrate aquí</a>
</p>
</footer>
</main>
<div class="fixed -bottom-20 -left-20 w-64 h-64 bg-primary/5 rounded-full blur-3xl -z-10"></div>
<div class="fixed -top-20 -right-20 w-80 h-80 bg-secondary-container/20 rounded-full blur-3xl -z-10"></div>
</body></html>
